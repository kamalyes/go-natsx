on:
  push:
    branches:
      - master
    paths:
      - "**"
      - "!docs/**"
      - "!**.md"
  pull_request:
    paths:
      - "**"
      - "!docs/**"
      - "!**.md"

name: Test
jobs:
  Build:
    strategy:
      matrix:
        go-version: [1.21.x, 1.22.x]
        platform: [ubuntu-latest, windows-latest, macos-latest, macos-14]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Fetch Repository
        uses: actions/checkout@v5

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install nats-server (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -L https://github.com/nats-io/nats-server/releases/download/v2.12.7/nats-server-v2.12.7-linux-amd64.tar.gz -o nats-server.tar.gz
          tar -xzf nats-server.tar.gz
          sudo cp nats-server-v2.12.7-linux-amd64/nats-server /usr/local/bin/

      - name: Install nats-server (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -L https://github.com/nats-io/nats-server/releases/download/v2.12.7/nats-server-v2.12.7-darwin-amd64.tar.gz -o nats-server.tar.gz
          tar -xzf nats-server.tar.gz
          sudo cp nats-server-v2.12.7-darwin-amd64/nats-server /usr/local/bin/

      - name: Install nats-server (macOS ARM)
        if: ${{ runner.os == 'macOS' && runner.arch == 'ARM64' }}
        run: |
          curl -L https://github.com/nats-io/nats-server/releases/download/v2.12.7/nats-server-v2.12.7-darwin-arm64.tar.gz -o nats-server.tar.gz
          tar -xzf nats-server.tar.gz
          sudo cp nats-server-v2.12.7-darwin-arm64/nats-server /usr/local/bin/

      - name: Install nats-server (Windows)
        if: runner.os == 'Windows'
        run: |
          Invoke-WebRequest -Uri "https://github.com/nats-io/nats-server/releases/download/v2.12.7/nats-server-v2.12.7-windows-amd64.zip" -OutFile "nats-server.zip"
          Expand-Archive -Path "nats-server.zip" -DestinationPath "nats-server"
          Copy-Item "nats-server\nats-server-v2.12.7-windows-amd64\nats-server.exe" -Destination "C:\Windows\System32\"

      - name: Start nats-server (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          nats-server -js &
          sleep 2

      - name: Start nats-server (Windows)
        if: runner.os == 'Windows'
        run: |
          Start-Process -FilePath "nats-server.exe" -ArgumentList "-js" -NoNewWindow
          Start-Sleep -Seconds 2

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v1.12.0

      - name: Test
        run: gotestsum -f testname -- ./... -race -count=1 -shuffle=on
        continue-on-error: true

      - name: Test with coverage
        run: gotestsum -f testname -- ./... -race -count=1 -coverprofile=coverage.txt -covermode=atomic -shuffle=on
        continue-on-error: true

      - name: Upload coverage reports to Codecov
        if: ${{ matrix.platform == 'ubuntu-latest' && matrix.go-version == '1.22.x' }}
        uses: codecov/codecov-action@v4.5.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.txt
          flags: unittests
          slug: kamalyes/go-natsx
